<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  const githubOwner = 'amarchenko97';
  const githubRepo = 'twimteam.webflow';
  const branch = 'main';
  const blogFolder = 'content/blog';
  const teamFolder = 'content/team';

  const slug = new URLSearchParams(window.location.search).get('slug') ||
    window.location.pathname.split('/').filter(Boolean).pop();

  const titleEl = document.querySelector('.blog-container h1');
  const richTextEl = document.querySelector('.rich-text-block.w-richtext');
  const mainImageEl = document.querySelector('.main-image');
  const avatarTopEl = document.querySelector('.avatar-image');
  const avatarBottomEl = document.querySelector('.avatar-image-copy');
  const topMetaEls = document.querySelectorAll('.author-and-date .author-name');
  const writtenByEl = document.querySelector('.text-block-7');
  const authorPositionEl = document.querySelector('.text-block-5');

  if (!slug || !richTextEl) return;

  function parseFrontMatter(markdown) {
    const match = markdown.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if (!match) return { data: {}, body: markdown };

    const data = {};
    match[1].split('\n').forEach(function (line) {
      const separatorIndex = line.indexOf(':');
      if (separatorIndex === -1) return;

      const key = line.slice(0, separatorIndex).trim();
      let value = line.slice(separatorIndex + 1).trim();
      value = value.replace(/^['"]|['"]$/g, '');
      data[key] = value;
    });

    return { data: data, body: match[2].trim() };
  }

  function formatDate(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;

    return date.toLocaleDateString('en-US', {
      month: 'long',
      day: 'numeric',
      year: 'numeric'
    });
  }

  async function fetchMarkdownFromFolder(folder, fileSlug) {
    const url = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${folder}/${fileSlug}.md?ref=${branch}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Cannot load ${folder}/${fileSlug}.md`);
    const file = await response.json();
    const markdownResponse = await fetch(file.download_url);
    if (!markdownResponse.ok) throw new Error(`Cannot download ${fileSlug}.md`);
    return markdownResponse.text();
  }

  function setBackground(el, imageUrl) {
    if (!el || !imageUrl) return;
    el.style.backgroundImage = `url("${imageUrl}")`;
  }

  try {
    const postMarkdown = await fetchMarkdownFromFolder(blogFolder, slug);
    const post = parseFrontMatter(postMarkdown);
    let author = {};

    if (post.data.author) {
      try {
        const authorMarkdown = await fetchMarkdownFromFolder(teamFolder, post.data.author);
        author = parseFrontMatter(authorMarkdown).data;
      } catch (error) {
        console.warn('Author was not loaded', error);
      }
    }

    document.title = post.data.title || document.title;

    if (titleEl) titleEl.textContent = post.data.title || '';
    if (topMetaEls[0]) topMetaEls[0].textContent = author.name || post.data.written_by || '';
    if (topMetaEls[1]) topMetaEls[1].textContent = formatDate(post.data.date);
    if (writtenByEl) writtenByEl.textContent = author.name || post.data.written_by || '';
    if (authorPositionEl) authorPositionEl.textContent = author.position || '';

    setBackground(mainImageEl, post.data.cover);
    setBackground(avatarTopEl, author.photo);
    setBackground(avatarBottomEl, author.photo);

    richTextEl.classList.remove('w-dyn-bind-empty');
    richTextEl.innerHTML = marked.parse(post.body || '');
  } catch (error) {
    console.error(error);
    if (titleEl) titleEl.textContent = 'Post not found';
    richTextEl.innerHTML = '<p>Sorry, this article could not be loaded.</p>';
  }
});
</script>
