<script>
document.addEventListener('DOMContentLoaded', async function () {
  const githubOwner = 'amarchenko97';
  const githubRepo = 'twimteam.webflow';
  const branch = 'main';
  const blogFolder = 'content/blog';
  const teamFolder = 'content/team';

  const listEl = document.querySelector('.collection-list.w-dyn-items');
  const emptyEl = document.querySelector('.w-dyn-empty');
  const paginationEl = document.querySelector('.w-pagination-wrapper');

  if (!listEl) return;

  listEl.innerHTML = '';
  if (paginationEl) paginationEl.style.display = 'none';

  function parseFrontMatter(markdown) {
    const match = markdown.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if (!match) return { data: {}, body: markdown };

    const data = {};
    match[1].split('\n').forEach(function (line) {
      const separatorIndex = line.indexOf(':');
      if (separatorIndex === -1) return;

      const key = line.slice(0, separatorIndex).trim();
      let value = line.slice(separatorIndex + 1).trim();
      value = value.replace(/^['"]|['"]$/g, '');
      data[key] = value;
    });

    return { data: data, body: match[2].trim() };
  }

  function formatDate(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value;

    return date.toLocaleDateString('en-US', {
      month: 'long',
      day: 'numeric',
      year: 'numeric'
    });
  }

  function createExcerpt(markdown) {
    return markdown
      .replace(/^#+\s+/gm, '')
      .replace(/[*_`>#-]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 150);
  }

  async function fetchFolder(folder) {
    const url = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${folder}?ref=${branch}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Cannot load ${folder}`);
    return response.json();
  }

  async function fetchMarkdown(file) {
    const response = await fetch(file.download_url);
    if (!response.ok) throw new Error(`Cannot load ${file.name}`);
    return response.text();
  }

  async function loadAuthors() {
    const authors = {};
    const files = await fetchFolder(teamFolder);
    const markdownFiles = files.filter(function (file) {
      return file.type === 'file' && file.name.endsWith('.md');
    });

    await Promise.all(markdownFiles.map(async function (file) {
      const markdown = await fetchMarkdown(file);
      const parsed = parseFrontMatter(markdown);
      const slug = file.name.replace(/\.md$/, '');
      authors[slug] = parsed.data;
    }));

    return authors;
  }

  function createBlogCard(post, authors) {
    const author = authors[post.author] || {};
    const slug = post.slug;

    const item = document.createElement('div');
    item.setAttribute('role', 'listitem');
    item.className = 'collection-item w-dyn-item w-col w-col-4';

    const link = document.createElement('a');
    link.href = `/blog/${slug}`;
    link.className = 'blog-card w-inline-block';

    const thumbnail = document.createElement('div');
    thumbnail.className = 'thumbnail';
    if (post.cover) thumbnail.style.backgroundImage = `url("${post.cover}")`;

    const content = document.createElement('div');
    content.className = 'card-content';

    const textWrap = document.createElement('div');

    const title = document.createElement('h2');
    title.className = 'heading-7';
    title.textContent = post.title || '';

    const caption = document.createElement('p');
    caption.className = 'caption';
    caption.textContent = post.summary || post.description || post.excerpt || '';

    textWrap.appendChild(title);
    textWrap.appendChild(caption);

    const meta = document.createElement('div');
    meta.className = 'author-and-date blog-pg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar-image blog-page';
    if (author.photo) avatar.style.backgroundImage = `url("${author.photo}")`;

    const authorName = document.createElement('div');
    authorName.className = 'author-name blog-pg';
    authorName.textContent = author.name || post.written_by || '';

    const divider = document.createElement('div');
    divider.className = 'divider blog-pg';
    divider.textContent = '|';

    const date = document.createElement('div');
    date.className = 'author-name blog-pg';
    date.textContent = formatDate(post.date);

    meta.appendChild(avatar);
    meta.appendChild(authorName);
    meta.appendChild(divider);
    meta.appendChild(date);

    content.appendChild(textWrap);
    content.appendChild(meta);

    link.appendChild(thumbnail);
    link.appendChild(content);
    item.appendChild(link);

    return item;
  }

  try {
    const authors = await loadAuthors();
    const files = await fetchFolder(blogFolder);
    const markdownFiles = files.filter(function (file) {
      return file.type === 'file' && file.name.endsWith('.md');
    });

    const posts = await Promise.all(markdownFiles.map(async function (file) {
      const markdown = await fetchMarkdown(file);
      const parsed = parseFrontMatter(markdown);

      return {
        ...parsed.data,
        slug: file.name.replace(/\.md$/, ''),
        excerpt: createExcerpt(parsed.body)
      };
    }));

    posts.sort(function (a, b) {
      return new Date(b.date || 0) - new Date(a.date || 0);
    });

    if (!posts.length) {
      if (emptyEl) emptyEl.style.display = 'block';
      return;
    }

    if (emptyEl) emptyEl.style.display = 'none';

    posts.forEach(function (post) {
      listEl.appendChild(createBlogCard(post, authors));
    });
  } catch (error) {
    console.error(error);
    if (emptyEl) emptyEl.style.display = 'block';
  }
});
</script>
